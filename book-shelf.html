<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ほんだな</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --paper: #f7f3ed;
    --warm: #e8e0d0;
    --accent: #c4603a;
    --accent-light: #f0d5c8;
    --muted: #7a7065;
    --spine-1: #3b6e8c;
    --spine-2: #7b4f8e;
    --spine-3: #c4603a;
    --spine-4: #4a8c5c;
    --spine-5: #8c6b3a;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--ink);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(26,26,46,0.3);
  }

  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--paper);
    letter-spacing: 0.1em;
  }

  .logo span {
    color: var(--accent);
  }

  .header-stats {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }

  .header-stats strong {
    color: var(--accent-light);
    font-size: 16px;
  }

  /* Main layout */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 120px;
  }

  /* Search & filter bar */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .search-box {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--warm);
    border-radius: 8px;
    background: white;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }

  .filter-btn {
    padding: 10px 14px;
    border: 1.5px solid var(--warm);
    border-radius: 8px;
    background: white;
    font-family: inherit;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* Book list */
  .book-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .book-card {
    background: white;
    border-radius: 10px;
    display: flex;
    gap: 0;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(26,26,46,0.08);
    transition: box-shadow 0.2s;
  }

  .book-card:hover { box-shadow: 0 4px 12px rgba(26,26,46,0.14); }

  .book-spine {
    width: 6px;
    flex-shrink: 0;
  }

  .book-cover-thumb {
    width: 60px;
    flex-shrink: 0;
    background: var(--warm);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .book-cover-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .book-cover-thumb .no-cover {
    font-size: 22px;
  }

  .book-info {
    flex: 1;
    padding: 12px 14px;
    min-width: 0;
  }

  .book-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .book-author {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .book-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .status-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 500;
  }

  .status-unread { background: var(--warm); color: var(--muted); }
  .status-reading { background: #fef3e2; color: #b45309; }
  .status-done { background: #e8f5e9; color: #2e7d32; }

  .book-date { font-size: 11px; color: #bbb; }

  .book-actions {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 10px;
    gap: 6px;
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .icon-btn:hover { background: var(--warm); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; line-height: 1.8; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 56px;
    padding: 14px 22px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(196,96,58,0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 50;
  }

  .fab:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(196,96,58,0.45); }

  /* Modal backdrop */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.55);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--paper);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px 20px 32px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--warm);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--warm);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 20px;
    gap: 3px;
  }

  .tab {
    flex: 1;
    padding: 9px;
    border: none;
    background: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .tab.active {
    background: white;
    color: var(--ink);
    font-weight: 500;
    box-shadow: 0 1px 3px rgba(26,26,46,0.1);
  }

  /* Scanner area */
  .scanner-section { display: none; }
  .scanner-section.visible { display: block; }

  .scanner-box {
    position: relative;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    height: 220px;
    margin-bottom: 12px;
  }

  #scanner-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .scanner-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scanner-frame {
    width: 200px;
    height: 80px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    position: relative;
  }

  .scanner-line {
    position: absolute;
    width: 100%;
    height: 2px;
    background: var(--accent);
    top: 50%;
    animation: scan 1.5s ease-in-out infinite;
    opacity: 0.8;
  }

  @keyframes scan {
    0%, 100% { top: 10%; }
    50% { top: 90%; }
  }

  .scanner-hint {
    margin-top: 12px;
    color: white;
    font-size: 12px;
    background: rgba(0,0,0,0.5);
    padding: 4px 10px;
    border-radius: 99px;
  }

  #scanner-result {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
  }

  .scan-start-btn {
    width: 100%;
    padding: 12px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }

  .scan-start-btn:hover { opacity: 0.85; }

  /* Manual form */
  .manual-section { display: none; }
  .manual-section.visible { display: block; }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--warm);
    border-radius: 8px;
    background: white;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }

  .form-group textarea { resize: vertical; min-height: 72px; }

  .isbn-row {
    display: flex;
    gap: 8px;
  }

  .isbn-row input { flex: 1; }

  .isbn-lookup-btn {
    padding: 10px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .isbn-lookup-btn:hover { opacity: 0.85; }

  .fetching-indicator {
    text-align: center;
    padding: 12px;
    font-size: 13px;
    color: var(--muted);
    display: none;
  }

  .fetching-indicator.show { display: block; }

  .save-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
    letter-spacing: 0.05em;
  }

  .save-btn:hover { opacity: 0.85; }

  .close-modal-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--warm);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal { position: relative; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Status cycle */
  .status-cycle { cursor: pointer; user-select: none; }

  /* Book detail modal */
  .detail-cover {
    width: 100%;
    height: 160px;
    background: var(--warm);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    font-size: 48px;
  }

  .detail-cover img {
    height: 100%;
    object-fit: contain;
  }
</style>
</head>
<body>

<header>
  <div class="logo">ほん<span>だな</span></div>
  <div class="header-stats"><strong id="total-count">0</strong><br>冊</div>
</header>

<main>
  <div class="toolbar">
    <input type="text" class="search-box" placeholder="タイトル・著者で検索…" id="search-input">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="reading">読書中</button>
    <button class="filter-btn" data-filter="done">読了</button>
  </div>

  <div class="book-list" id="book-list">
    <!-- populated by JS -->
  </div>

  <div class="empty-state" id="empty-state" style="display:none">
    <div class="empty-icon">📚</div>
    <p>まだ本がありません。<br>右下のボタンから最初の1冊を登録してみましょう。</p>
  </div>
</main>

<button class="fab" id="add-btn">＋ 本を追加</button>

<!-- Add Modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="close-modal-btn" id="close-modal">✕</button>
    <div class="modal-title">本を登録する</div>

    <div class="tabs">
      <button class="tab active" data-tab="scan">📷 バーコード</button>
      <button class="tab" data-tab="isbn">🔢 ISBN入力</button>
      <button class="tab" data-tab="manual">✏️ 手動入力</button>
    </div>

    <!-- Scanner tab -->
    <div class="scanner-section visible" id="tab-scan">
      <button class="scan-start-btn" id="start-scan-btn">📷 カメラを起動する</button>
      <div class="scanner-box" id="scanner-box" style="display:none">
        <div id="scanner-video-container"></div>
        <div class="scanner-overlay">
          <div class="scanner-frame">
            <div class="scanner-line"></div>
          </div>
          <div class="scanner-hint">バーコードを枠内に合わせてください</div>
        </div>
      </div>
      <div id="scanner-result"></div>
      <div class="fetching-indicator" id="scan-fetching">📖 書籍情報を取得中…</div>
    </div>

    <!-- ISBN tab -->
    <div class="manual-section" id="tab-isbn">
      <div class="form-group">
        <label>ISBN (13桁 または 10桁)</label>
        <div class="isbn-row">
          <input type="text" id="isbn-input" placeholder="例: 9784101092058" maxlength="17">
          <button class="isbn-lookup-btn" id="isbn-lookup-btn">検索</button>
        </div>
      </div>
      <div class="fetching-indicator" id="isbn-fetching">📖 書籍情報を取得中…</div>
    </div>

    <!-- Manual tab (shared for all) -->
    <div id="book-form">
      <div class="form-group">
        <label>タイトル *</label>
        <input type="text" id="f-title" placeholder="本のタイトル">
      </div>
      <div class="form-group">
        <label>著者</label>
        <input type="text" id="f-author" placeholder="著者名">
      </div>
      <div class="form-group">
        <label>出版社</label>
        <input type="text" id="f-publisher" placeholder="出版社名">
      </div>
      <div class="form-group">
        <label>ステータス</label>
        <select id="f-status">
          <option value="unread">📚 積読（未読）</option>
          <option value="reading">📖 読書中</option>
          <option value="done">✅ 読了</option>
        </select>
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="f-memo" placeholder="感想や気になった点など…"></textarea>
      </div>
      <input type="hidden" id="f-isbn">
      <input type="hidden" id="f-cover">
      <input type="hidden" id="edit-id">
      <button class="save-btn" id="save-btn">本棚に追加する</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'hondana_books';
let books = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentFilter = 'all';
let scannerActive = false;

const spineColors = ['#3b6e8c','#7b4f8e','#c4603a','#4a8c5c','#8c6b3a','#5c7a8c','#8c3b5c'];
function spineColor(title) {
  let h = 0;
  for (let c of title) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return spineColors[Math.abs(h) % spineColors.length];
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Render ─────────────────────────────────────────────────────────────────
function render() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let list = books.filter(b => {
    const matchFilter = currentFilter === 'all' || b.status === currentFilter;
    const matchQ = !q || b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q);
    return matchFilter && matchQ;
  });

  document.getElementById('total-count').textContent = books.length;
  const el = document.getElementById('book-list');
  const empty = document.getElementById('empty-state');

  if (list.length === 0) {
    el.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const statusLabel = { unread: '積読', reading: '読書中', done: '読了' };
  const statusClass = { unread: 'status-unread', reading: 'status-reading', done: 'status-done' };

  el.innerHTML = list.map(b => `
    <div class="book-card" data-id="${b.id}">
      <div class="book-spine" style="background:${spineColor(b.title)}"></div>
      <div class="book-cover-thumb">
        ${b.cover
          ? `<img src="${b.cover}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="no-cover" ${b.cover ? 'style="display:none"' : ''}>📕</div>
      </div>
      <div class="book-info">
        <div class="book-title">${esc(b.title)}</div>
        <div class="book-author">${esc(b.author || '著者不明')}</div>
        <div class="book-meta">
          <span class="status-badge ${statusClass[b.status]} status-cycle" data-id="${b.id}">${statusLabel[b.status]}</span>
          <span class="book-date">${b.date}</span>
        </div>
      </div>
      <div class="book-actions">
        <button class="icon-btn" title="編集" onclick="editBook('${b.id}')">✏️</button>
        <button class="icon-btn" title="削除" onclick="deleteBook('${b.id}')">🗑️</button>
      </div>
    </div>
  `).join('');

  // status cycle
  document.querySelectorAll('.status-cycle').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.id;
      const b = books.find(x => x.id === id);
      if (!b) return;
      const cycle = { unread: 'reading', reading: 'done', done: 'unread' };
      b.status = cycle[b.status];
      save(); render();
    });
  });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Filters ────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('search-input').addEventListener('input', render);

// ─── Modal ──────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('add-modal').classList.add('open');
  clearForm();
}

function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
  stopScanner();
}

document.getElementById('add-btn').addEventListener('click', openModal);
document.getElementById('close-modal').addEventListener('click', closeModal);
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) closeModal();
});

// ─── Tabs ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const which = tab.dataset.tab;

    document.getElementById('tab-scan').classList.toggle('visible', which === 'scan');
    document.getElementById('tab-isbn').classList.toggle('visible', which === 'isbn');

    if (which !== 'scan') stopScanner();
  });
});

// ─── Scanner (QuaggaJS) ─────────────────────────────────────────────────────
document.getElementById('start-scan-btn').addEventListener('click', startScanner);

function startScanner() {
  const box = document.getElementById('scanner-box');
  box.style.display = 'block';
  document.getElementById('start-scan-btn').style.display = 'none';
  document.getElementById('scanner-result').textContent = '';

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.getElementById('scanner-video-container'),
      constraints: { facingMode: "environment", width: 640, height: 480 }
    },
    decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] },
    locate: true
  }, err => {
    if (err) {
      document.getElementById('scanner-result').textContent = '❌ カメラを起動できませんでした。ISBNを直接入力してください。';
      box.style.display = 'none';
      document.getElementById('start-scan-btn').style.display = 'flex';
      return;
    }
    Quagga.start();
    scannerActive = true;
  });

  let lastCode = '';
  Quagga.onDetected(result => {
    const code = result.codeResult.code;
    if (code === lastCode) return;
    lastCode = code;
    document.getElementById('scanner-result').textContent = `📗 検出: ${code}`;
    stopScanner();
    fetchBookByISBN(code, 'scan');
  });
}

function stopScanner() {
  if (scannerActive) {
    Quagga.stop();
    scannerActive = false;
  }
  const box = document.getElementById('scanner-box');
  if (box) box.style.display = 'none';
  const btn = document.getElementById('start-scan-btn');
  if (btn) btn.style.display = 'flex';
}

// ─── ISBN lookup ─────────────────────────────────────────────────────────────
document.getElementById('isbn-lookup-btn').addEventListener('click', () => {
  const isbn = document.getElementById('isbn-input').value.replace(/[-\s]/g,'');
  if (!isbn) { showToast('ISBNを入力してください'); return; }
  fetchBookByISBN(isbn, 'isbn');
});

document.getElementById('isbn-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('isbn-lookup-btn').click();
});

async function fetchBookByISBN(isbn, source) {
  const fetchId = source === 'scan' ? 'scan-fetching' : 'isbn-fetching';
  document.getElementById(fetchId).classList.add('show');

  let title = '', author = '', publisher = '', cover = '';

  try {
    // 1st: OpenBD（日本の書籍に強い）
    const openRes = await fetch(`https://api.openbd.jp/v1/get?isbn=${isbn}`);
    const openData = await openRes.json();

    if (openData && openData[0]) {
      const summary = openData[0].summary;
      title = summary.title || '';
      author = summary.author || '';
      publisher = summary.publisher || '';
      cover = summary.cover || '';
    }
  } catch(e) {}

  // 2nd: Google Books（カバーがない場合など補完）
  if (!title) {
    try {
      const gRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
      const gData = await gRes.json();
      if (gData.totalItems > 0) {
        const info = gData.items[0].volumeInfo;
        title = title || info.title || '';
        author = author || (info.authors || []).join(', ');
        publisher = publisher || info.publisher || '';
        cover = cover || info.imageLinks?.thumbnail?.replace('http:', 'https:') || '';
      }
    } catch(e) {}
  }

  document.getElementById(fetchId).classList.remove('show');

  if (!title) {
    showToast('書籍が見つかりませんでした。手動で入力してください。');
    return;
  }

  document.getElementById('f-title').value = title;
  document.getElementById('f-author').value = author;
  document.getElementById('f-publisher').value = publisher;
  document.getElementById('f-isbn').value = isbn;
  document.getElementById('f-cover').value = cover;

  showToast('✅ 書籍情報を取得しました！');

  // Switch to form tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="manual"]').classList.add('active');
  document.getElementById('tab-scan').classList.remove('visible');
  document.getElementById('tab-isbn').classList.remove('visible');
}

// ─── Save ────────────────────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', () => {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { showToast('タイトルを入力してください'); return; }

  const editId = document.getElementById('edit-id').value;
  const today = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});

  if (editId) {
    const b = books.find(x => x.id === editId);
    if (b) {
      b.title = title;
      b.author = document.getElementById('f-author').value.trim();
      b.publisher = document.getElementById('f-publisher').value.trim();
      b.status = document.getElementById('f-status').value;
      b.memo = document.getElementById('f-memo').value.trim();
      b.cover = document.getElementById('f-cover').value;
      b.isbn = document.getElementById('f-isbn').value;
    }
    showToast('✏️ 更新しました');
  } else {
    books.unshift({
      id: Date.now().toString(),
      title,
      author: document.getElementById('f-author').value.trim(),
      publisher: document.getElementById('f-publisher').value.trim(),
      status: document.getElementById('f-status').value,
      memo: document.getElementById('f-memo').value.trim(),
      cover: document.getElementById('f-cover').value,
      isbn: document.getElementById('f-isbn').value,
      date: today
    });
    showToast('📚 本棚に追加しました！');
  }

  save(); render(); closeModal();
});

// ─── Edit / Delete ──────────────────────────────────────────────────────────
function editBook(id) {
  const b = books.find(x => x.id === id);
  if (!b) return;
  openModal();
  setTimeout(() => {
    document.getElementById('f-title').value = b.title;
    document.getElementById('f-author').value = b.author || '';
    document.getElementById('f-publisher').value = b.publisher || '';
    document.getElementById('f-status').value = b.status;
    document.getElementById('f-memo').value = b.memo || '';
    document.getElementById('f-cover').value = b.cover || '';
    document.getElementById('f-isbn').value = b.isbn || '';
    document.getElementById('edit-id').value = b.id;
    document.getElementById('save-btn').textContent = '変更を保存する';
    // switch to manual tab
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-tab="manual"]').classList.add('active');
    document.getElementById('tab-scan').classList.remove('visible');
    document.getElementById('tab-isbn').classList.remove('visible');
  }, 50);
}

function deleteBook(id) {
  if (!confirm('この本を削除しますか？')) return;
  books = books.filter(x => x.id !== id);
  save(); render();
  showToast('🗑️ 削除しました');
}

function clearForm() {
  ['f-title','f-author','f-publisher','f-memo','f-cover','f-isbn','edit-id','isbn-input'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-status').value = 'unread';
  document.getElementById('save-btn').textContent = '本棚に追加する';
  document.getElementById('scanner-result').textContent = '';
  document.getElementById('scan-fetching').classList.remove('show');
  document.getElementById('isbn-fetching').classList.remove('show');
  // reset tabs
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  document.getElementById('tab-scan').classList.add('visible');
  document.getElementById('tab-isbn').classList.remove('visible');
}

// ─── Init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
